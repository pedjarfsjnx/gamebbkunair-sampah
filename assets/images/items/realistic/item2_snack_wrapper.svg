<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Realistic Metallic Foil Reflection -->
    <linearGradient id="realFoil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="25%" stop-color="#ffd54f"/>
      <stop offset="50%" stop-color="#ffb300"/>
      <stop offset="75%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </linearGradient>

    <linearGradient id="foilSheen" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="shadowFoil" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-color="#1b5e20" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Realistic Crushed Potato Chips Foil Bag -->
  <g transform="rotate(15 60 60)" filter="url(#shadowFoil)">
    <!-- Main Wrinkled Bag Contour -->
    <path d="M 18 22 Q 35 15 60 20 Q 88 12 102 26 Q 95 55 100 82 Q 72 94 48 86 Q 22 92 14 74 Q 24 48 18 22 Z" fill="url(#realFoil)" stroke="#e65100" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Inner Foil Layer -->
    <path d="M 24 28 Q 58 24 94 30 Q 88 56 92 76 Q 52 84 22 70 Q 28 50 24 28 Z" fill="url(#foilSheen)"/>

    <!-- Wrinkle & Crease Lines for Realistic Crushed Effect -->
    <path d="M 28 35 Q 50 48 85 32" stroke="#d7ccc8" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M 20 55 Q 48 62 92 50" stroke="#bcaaa4" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M 35 70 Q 65 75 88 68" stroke="#8d6e63" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 45 25 L 35 75" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Realistic Brand Logo Graphic -->
    <g transform="translate(38, 36) rotate(-8)">
      <ellipse cx="25" cy="18" rx="22" ry="14" fill="#d32f2f" stroke="#9a0007" stroke-width="2"/>
      <ellipse cx="25" cy="18" rx="18" ry="11" fill="#ffeb3b"/>
      <text x="25" y="22" font-family="'Fredoka', sans-serif" font-weight="900" font-size="11" fill="#d32f2f" text-anchor="middle">TARO</text>
    </g>

    <!-- Potato Chips Illustration on Bag -->
    <ellipse cx="40" cy="68" rx="10" ry="6" fill="#ffe082" stroke="#ffb300" stroke-width="1.5" transform="rotate(-15 40 68)"/>
    <ellipse cx="58" cy="72" rx="12" ry="7" fill="#ffd54f" stroke="#ffb300" stroke-width="1.5" transform="rotate(20 58 72)"/>

    <!-- Top & Bottom Zag-Zag Crimped Seals -->
    <path d="M 18 22 L 25 26 L 32 21 L 39 26 L 46 21 L 53 26 L 60 21 L 67 26 L 74 21 L 81 26 L 88 21 L 95 26 L 102 26" stroke="#b71c1c" stroke-width="2.5" fill="none"/>
    <path d="M 14 74 L 22 78 L 30 73 L 38 78 L 46 73 L 54 78 L 62 73 L 70 78 L 78 73 L 86 78 L 94 73 L 100 82" stroke="#b71c1c" stroke-width="2.5" fill="none"/>
  </g>
</svg>
