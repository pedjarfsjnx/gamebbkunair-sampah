<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadowLoose" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Crushed / Dented Loose Ecobrick Bottle -->
  <g transform="rotate(-12 60 60)" filter="url(#shadowLoose)">
    <!-- Sagging Bottle Contour -->
    <path d="M 38 25 Q 60 35 82 25 L 90 92 Q 60 84 30 92 Z" fill="#e0f7fa" fill-opacity="0.7" stroke="#ff9800" stroke-width="3" stroke-dasharray="8,4"/>

    <!-- Hollow Gaps inside Loose Ecobrick Plastic Fill -->
    <rect x="42" y="62" width="36" height="24" fill="#ce93d8" rx="4" opacity="0.8"/>
    
    <!-- Empty Void Gap Lines showing it's not packed -->
    <path d="M 40 45 L 80 45 M 40 54 L 80 54" stroke="#e65100" stroke-width="2.5" stroke-dasharray="4,4"/>

    <!-- Bottle Neck -->
    <rect x="52" y="15" width="16" height="12" fill="#e0f7fa" stroke="#ff9800" stroke-width="2"/>
    <rect x="50" y="8" width="20" height="8" rx="2" fill="#ff9800"/>

    <!-- Question Mark & Alert Badge -->
    <circle cx="60" cy="48" r="16" fill="#ff9800" stroke="#ffffff" stroke-width="2"/>
    <text x="60" y="56" font-family="'Fredoka', sans-serif" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle">?</text>
  </g>
</svg>
