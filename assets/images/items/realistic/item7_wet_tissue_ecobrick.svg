<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadowTissue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#shadowTissue)">
    <!-- PET Bottle Body -->
    <rect x="35" y="42" width="50" height="72" rx="12" fill="#e0f7fa" fill-opacity="0.75" stroke="#00bcd4" stroke-width="2.5"/>
    <rect x="40" y="65" width="40" height="44" fill="#bbdefb" rx="4"/>

    <!-- Bottle Neck -->
    <rect x="50" y="28" width="20" height="15" fill="#e0f7fa" stroke="#00bcd4" stroke-width="2"/>

    <!-- REALISTIC SOGGY WET TISSUE POKING OUT OF NECK -->
    <path d="M 36 32 C 22 12 45 4 60 12 C 80 5 90 22 74 32 Z" fill="#ffffff" stroke="#b0bec5" stroke-width="2.5"/>
    <path d="M 42 22 Q 55 12 70 20" fill="none" stroke="#cfd8dc" stroke-width="2"/>

    <!-- Water Droplets & Greenish Mold Spots -->
    <circle cx="45" cy="18" r="3" fill="#29b6f6"/>
    <circle cx="68" cy="22" r="3.5" fill="#29b6f6"/>
    <circle cx="58" cy="14" r="4" fill="#66bb6a"/>
    <circle cx="50" cy="24" r="3" fill="#43a047"/>

    <!-- Mold Alert Badge -->
    <circle cx="60" cy="82" r="14" fill="#7b1fa2" stroke="#ffffff" stroke-width="2"/>
    <text x="60" y="88" font-family="'Fredoka', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">!</text>
  </g>
</svg>
