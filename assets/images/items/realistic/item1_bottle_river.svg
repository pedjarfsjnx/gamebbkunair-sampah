<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Realistic PET Plastic Transparency -->
    <linearGradient id="petPlastic" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#b2ebf2" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#80deea" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#e0f7fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Realistic Water Level Inside -->
    <linearGradient id="waterInside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0.7"/>
    </linearGradient>

    <radialGradient id="waterRipple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#80deea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0"/>
    </radialGradient>

    <!-- Realistic Drop Shadow -->
    <filter id="realShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#01579b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Water Ripple Rings -->
  <ellipse cx="60" cy="78" rx="52" ry="18" fill="url(#waterRipple)"/>
  <ellipse cx="60" cy="78" rx="38" ry="12" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="60" cy="78" rx="24" ry="7" fill="none" stroke="#e0f7fa" stroke-width="1.5" opacity="0.9"/>

  <!-- Floating Realistic Plastic Mineral Bottle -->
  <g transform="rotate(-22 60 60)" filter="url(#realShadow)">
    <!-- Water inside bottom half -->
    <path d="M 22 45 L 85 45 C 88 56 85 68 82 70 C 72 75 35 75 25 70 C 20 65 20 54 22 45 Z" fill="url(#waterInside)"/>

    <!-- Bottle Main PET Body -->
    <rect x="20" y="32" width="68" height="36" rx="12" fill="url(#petPlastic)" stroke="#00acc1" stroke-width="2"/>
    
    <!-- Bottle Ribbed Grooves (Realistic Texture) -->
    <line x1="30" y1="36" x2="30" y2="64" stroke="#00838f" stroke-width="1.5" opacity="0.4"/>
    <line x1="42" y1="36" x2="42" y2="64" stroke="#00838f" stroke-width="1.5" opacity="0.4"/>
    <line x1="68" y1="36" x2="68" y2="64" stroke="#00838f" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="36" x2="80" y2="64" stroke="#00838f" stroke-width="1.5" opacity="0.4"/>

    <!-- Realistic Mineral Water Brand Label -->
    <rect x="44" y="33" width="26" height="34" fill="#0288d1" rx="2"/>
    <rect x="46" y="35" width="22" height="30" fill="#ffffff"/>
    <path d="M 46 48 Q 57 40 68 48 L 68 65 L 46 65 Z" fill="#0288d1"/>
    <!-- Brand Logo Text -->
    <text x="57" y="44" font-family="'Fredoka', sans-serif" font-weight="900" font-size="6" fill="#0288d1" text-anchor="middle">PURE</text>
    <text x="57" y="58" font-family="sans-serif" font-weight="bold" font-size="5" fill="#ffffff" text-anchor="middle">AIR</text>

    <!-- Bottle Neck & Ribbed Cap -->
    <rect x="88" y="41" width="10" height="18" rx="2" fill="url(#petPlastic)" stroke="#00acc1" stroke-width="1.5"/>
    <!-- Security Seal Ring -->
    <rect x="96" y="40" width="3" height="20" fill="#01579b"/>
    <!-- Blue Cap -->
    <rect x="99" y="38" width="12" height="24" rx="4" fill="#0288d1" stroke="#01579b" stroke-width="1.5"/>
    <line x1="102" y1="38" x2="102" y2="62" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="38" x2="105" y2="62" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    <line x1="108" y1="38" x2="108" y2="62" stroke="#ffffff" stroke-width="1" opacity="0.6"/>

    <!-- Realistic Glass/Plastic Light Specular Highlight -->
    <path d="M 24 35 L 84 35" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
    <path d="M 26 40 L 82 40" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
