<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadowEcobrick" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <linearGradient id="bananaPeelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="60%" stop-color="#fbc02d"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadowEcobrick)">
    <!-- Clear PET Bottle Body -->
    <rect x="35" y="42" width="50" height="72" rx="12" fill="#e0f7fa" fill-opacity="0.75" stroke="#00bcd4" stroke-width="2.5"/>
    
    <!-- Dense Plastic Wrapper Fill Inside Bottle -->
    <g opacity="0.9">
      <rect x="40" y="65" width="40" height="22" fill="#ff4081" rx="4"/>
      <rect x="40" y="87" width="40" height="22" fill="#00e676" rx="4"/>
      <circle cx="50" cy="76" r="6" fill="#ffeb3b"/>
      <circle cx="68" cy="95" r="7" fill="#3d5afe"/>
    </g>

    <!-- Bottle Neck -->
    <rect x="50" y="28" width="20" height="15" fill="#e0f7fa" stroke="#00bcd4" stroke-width="2"/>

    <!-- REALISTIC ORGANIC BANANA PEEL STICKING OUT BOTTLE NECK -->
    <g transform="translate(60, 26)">
      <!-- Left Peel Flap -->
      <path d="M 0 5 C -25 -25 -40 0 -15 15 Z" fill="url(#bananaPeelGrad)" stroke="#f57f17" stroke-width="2"/>
      <!-- Right Peel Flap -->
      <path d="M 0 5 C 25 -25 40 0 15 15 Z" fill="url(#bananaPeelGrad)" stroke="#f57f17" stroke-width="2"/>
      <!-- Center Peel Flap -->
      <path d="M 0 5 C 0 -35 15 -35 4 10 Z" fill="#ffee58" stroke="#f57f17" stroke-width="2"/>

      <!-- Brown Aging Spots on Organic Banana Peel -->
      <circle cx="-18" cy="-5" r="2.5" fill="#5d4037"/>
      <circle cx="-10" cy="-12" r="2" fill="#3e2723"/>
      <circle cx="16" cy="-8" r="3" fill="#5d4037"/>
      <circle cx="5" cy="-20" r="2" fill="#3e2723"/>

      <!-- Top Stem -->
      <rect x="-3" y="-32" width="6" height="10" rx="2" fill="#4e342e"/>
    </g>

    <!-- Warning Caution Emblem Tag -->
    <circle cx="60" cy="82" r="14" fill="#e53935" stroke="#ffffff" stroke-width="2"/>
    <text x="60" y="88" font-family="'Fredoka', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">!</text>
  </g>
</svg>
