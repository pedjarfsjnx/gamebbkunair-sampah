<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadowDirty" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#1b5e20" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Realistic Greasy, Dirty Plastic Food Bag -->
  <g transform="rotate(-15 60 60)" filter="url(#shadowDirty)">
    <!-- Oily Wrinkled Plastic Bag -->
    <path d="M 22 30 Q 60 12 98 25 Q 108 65 90 95 Q 42 105 18 78 Q 28 50 22 30 Z" fill="#fff9c4" stroke="#fbc02d" stroke-width="3"/>

    <!-- Realistic Brown Oil, Grease & Sauce Stains -->
    <ellipse cx="45" cy="55" rx="18" ry="14" fill="#795548" opacity="0.8"/>
    <ellipse cx="74" cy="68" rx="15" ry="12" fill="#5d4037" opacity="0.85"/>
    <path d="M 32 75 Q 55 90 82 80" stroke="#3e2723" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Buzzing Flies Particles -->
    <circle cx="30" cy="22" r="3" fill="#000000"/><line x1="24" y1="19" x2="36" y2="25" stroke="#000000" stroke-width="1.2"/>
    <circle cx="88" cy="24" r="3" fill="#000000"/><line x1="82" y1="21" x2="94" y2="27" stroke="#000000" stroke-width="1.2"/>
  </g>
</svg>
