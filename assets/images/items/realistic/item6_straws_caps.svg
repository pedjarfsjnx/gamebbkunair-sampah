<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadowStraws" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1b5e20" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Realistic Scattered Plastic Straws and Ribbed Caps on Grass -->
  <g filter="url(#shadowStraws)">
    <!-- Straw 1: Red Striped -->
    <line x1="15" y1="25" x2="98" y2="88" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <line x1="15" y1="25" x2="98" y2="88" stroke="#e53935" stroke-width="9" stroke-linecap="round" stroke-dasharray="8,8"/>

    <!-- Straw 2: Neon Green -->
    <line x1="30" y1="95" x2="105" y2="30" stroke="#00e676" stroke-width="8" stroke-linecap="round"/>
    <line x1="30" y1="95" x2="105" y2="30" stroke="#1b5e20" stroke-width="1.5" stroke-dasharray="10,6"/>

    <!-- Straw 3: Yellow Flexible Bended Straw -->
    <path d="M 20 60 L 70 48 L 95 65" stroke="#ffeb3b" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Plastic Bottle Caps with Ribbed Texture -->
    <!-- Cap 1: Blue -->
    <circle cx="32" cy="42" r="14" fill="#0288d1" stroke="#01579b" stroke-width="2.5"/>
    <circle cx="32" cy="42" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="32" cy="42" r="4" fill="#01579b"/>

    <!-- Cap 2: Red -->
    <circle cx="85" cy="76" r="15" fill="#e53935" stroke="#b71c1c" stroke-width="2.5"/>
    <circle cx="85" cy="76" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Cap 3: Purple -->
    <circle cx="60" cy="92" r="12" fill="#8e24aa" stroke="#4a148c" stroke-width="2.5"/>
    <circle cx="60" cy="92" r="7" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  </g>
</svg>
