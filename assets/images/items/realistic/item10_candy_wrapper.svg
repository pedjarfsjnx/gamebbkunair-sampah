<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadowCandy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="3" flood-color="#1b5e20" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Realistic Twisted Candy Wrapper Dropped on Grass -->
  <g transform="rotate(20 60 60)" filter="url(#shadowCandy)">
    <!-- Candy Plastic Body -->
    <rect x="30" y="38" width="60" height="44" rx="10" fill="#e91e63" stroke="#c2185b" stroke-width="3"/>
    <rect x="42" y="38" width="36" height="44" fill="#ff4081"/>
    
    <!-- Specular Light Sheen -->
    <line x1="35" y1="44" x2="85" y2="44" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

    <!-- Twisted Ends -->
    <polygon points="30,50 6,25 6,95 30,70" fill="#ff80ab" stroke="#c2185b" stroke-width="2.5"/>
    <polygon points="90,50 114,25 114,95 90,70" fill="#ff80ab" stroke="#c2185b" stroke-width="2.5"/>

    <!-- Motion Arc Line -->
    <path d="M 12 15 Q 35 20 55 32" fill="none" stroke="#ffb300" stroke-width="3.5" stroke-dasharray="5,4"/>
  </g>
</svg>
