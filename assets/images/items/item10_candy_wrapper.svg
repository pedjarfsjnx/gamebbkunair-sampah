<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g transform="rotate(15 50 50)">
    <!-- Candy Body -->
    <rect x="25" y="30" width="50" height="40" rx="8" fill="#e91e63" stroke="#c2185b" stroke-width="3"/>
    <rect x="35" y="30" width="30" height="40" fill="#ff4081"/>
    <!-- Twist Ends -->
    <polygon points="25,40 5,20 5,80 25,60" fill="#ff80ab" stroke="#c2185b" stroke-width="2"/>
    <polygon points="75,40 95,20 95,80 75,60" fill="#ff80ab" stroke="#c2185b" stroke-width="2"/>
    <!-- Motion lines -->
    <path d="M 10 10 Q 30 15 45 25" fill="none" stroke="#ffb300" stroke-width="3" stroke-dasharray="4,3"/>
  </g>
</svg>
