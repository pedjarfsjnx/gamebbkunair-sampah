    <path d="M 30 75 Q 40 40 50 50 Q 60 30 70 75 Q 50 65 30 75 Z" fill="url(#fireGrad)"/>
    <path d="M 38 75 Q 45 50 50 55 Q 55 45 62 75 Z" fill="#fff59d"/>
