<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g>
    <!-- Organic Green Bin -->
    <rect x="25" y="35" width="50" height="60" fill="#388e3c" rx="6" stroke="#1b5e20" stroke-width="3"/>
    <rect x="18" y="27" width="64" height="12" fill="#1b5e20" rx="3"/>
    <text x="50" y="60" font-family="'Nunito', sans-serif" font-weight="900" font-size="10" fill="#ffffff" text-anchor="middle">ORGANIK</text>
    <!-- Plastic Bottles Overflowing in Organic Bin -->
    <g transform="translate(25, -5) rotate(20)">
      <rect x="10" y="10" width="16" height="30" fill="#e0f7fa" stroke="#00bcd4" stroke-width="2" rx="3"/>
      <rect x="14" y="5" width="8" height="6" fill="#e53935"/>
    </g>
    <path d="M 40 25 Q 55 5 70 20 Q 60 35 45 30 Z" fill="#e1bee7" stroke="#8e24aa" stroke-width="2"/>
    <!-- Warning Icon -->
    <circle cx="50" cy="80" r="10" fill="#ff3d00"/>
    <text x="50" y="85" font-family="sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">!</text>
  </g>
</svg>
