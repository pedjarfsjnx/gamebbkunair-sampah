<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0288d1" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Water Ripple -->
  <ellipse cx="50" cy="65" rx="42" ry="14" fill="none" stroke="#e0f7fa" stroke-width="3" opacity="0.8"/>
  <ellipse cx="50" cy="65" rx="28" ry="9" fill="none" stroke="#80deea" stroke-width="2" opacity="0.9"/>
  <!-- Plastic Bottle -->
  <g transform="rotate(-18 50 50)" filter="url(#glow1)">
    <!-- Bottle Body -->
    <rect x="25" y="30" width="50" height="28" rx="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="3"/>
    <rect x="32" y="34" width="36" height="20" rx="4" fill="#80deea" opacity="0.6"/>
    <!-- Bottle Label -->
    <rect x="35" y="32" width="22" height="24" fill="#0288d1" rx="2"/>
    <line x1="38" y1="40" x2="52" y2="40" stroke="#ffffff" stroke-width="2"/>
    <line x1="38" y1="46" x2="48" y2="46" stroke="#ffffff" stroke-width="2"/>
    <!-- Bottle Neck & Cap -->
    <rect x="75" y="37" width="8" height="14" rx="2" fill="#00bcd4"/>
    <rect x="83" y="35" width="10" height="18" rx="3" fill="#e53935"/>
    <!-- Highlights -->
    <line x1="28" y1="34" x2="70" y2="34" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
