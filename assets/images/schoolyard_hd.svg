<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- STORYBOOK ECO COMIC WARM PARCHMENT & INK PALETTE -->
    <linearGradient id="comicSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="40%" stop-color="#C8E6C9"/>
      <stop offset="75%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#F7F3E9"/>
    </linearGradient>

    <linearGradient id="comicSun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>

    <linearGradient id="comicHillBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>

    <linearGradient id="comicLawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="45%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>

    <linearGradient id="comicRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E57373"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>

    <linearGradient id="comicWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>

    <linearGradient id="comicRiver" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="50%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>

    <!-- INK DROP SHADOW -->
    <filter id="comicShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="#1C241B" flood-opacity="0.85"/>
    </filter>
  </defs>

  <!-- ==================== SKY & ATMOSPHERE ==================== -->
  <rect width="1280" height="720" fill="url(#comicSky)"/>

  <!-- Comic Sun -->
  <g filter="url(#comicShadow)">
    <circle cx="1140" cy="110" r="55" fill="url(#comicSun)" stroke="#1C241B" stroke-width="3.5"/>
  </g>

  <!-- Fluffy Comic Clouds with Ink Outlines -->
  <g fill="#FFFFFF" stroke="#1C241B" stroke-width="3" stroke-linejoin="round" filter="url(#comicShadow)">
    <path d="M 90 120 Q 110 85 155 95 Q 190 70 235 95 Q 270 105 260 140 Q 275 165 240 175 L 105 175 Q 75 165 90 120 Z"/>
    <path d="M 530 90 Q 555 55 600 65 Q 640 40 685 65 Q 720 80 705 115 Q 725 140 685 150 L 540 150 Q 505 140 530 90 Z"/>
    <path d="M 890 130 Q 910 100 955 110 Q 990 90 1030 110 Q 1060 125 1050 155 L 900 155 Q 870 145 890 130 Z"/>
  </g>

  <!-- Comic Hills -->
  <path d="M -50 380 Q 120 250 340 340 T 780 290 T 1200 330 T 1350 300 L 1350 480 L -50 480 Z" fill="url(#comicHillBack)" stroke="#1C241B" stroke-width="3"/>

  <!-- ==================== SCHOOL BUILDING (COMIC INK ART) ==================== -->
  <g id="comic-school-building" filter="url(#comicShadow)">
    <!-- Main Wall -->
    <rect x="220" y="160" width="540" height="230" fill="url(#comicWall)" rx="6" stroke="#1C241B" stroke-width="3.5"/>
    <rect x="210" y="380" width="560" height="16" fill="#8D6E63" rx="3" stroke="#1C241B" stroke-width="3"/>

    <!-- Roof -->
    <polygon points="190,165 490,75 790,165" fill="url(#comicRoof)" stroke="#1C241B" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="180,168 490,70 800,168 790,178 490,82 190,178" fill="#B71C1C" stroke="#1C241B" stroke-width="2"/>

    <!-- School Banner -->
    <rect x="380" y="125" width="220" height="42" fill="#FFFFFF" rx="8" stroke="#1C241B" stroke-width="3.5"/>
    <text x="490" y="152" font-family="'Fredoka', sans-serif" font-weight="900" font-size="16" fill="#1B5E20" text-anchor="middle">🏫 SD NEGERI SILIRAGUNG</text>

    <!-- Windows Row -->
    <g fill="#E0F7FA" stroke="#1C241B" stroke-width="3" rx="4">
      <rect x="260" y="195" width="70" height="60" rx="4"/>
      <line x1="295" y1="195" x2="295" y2="255"/>
      <line x1="260" y1="225" x2="330" y2="225"/>

      <rect x="350" y="195" width="70" height="60" rx="4"/>
      <line x1="385" y1="195" x2="385" y2="255"/>
      <line x1="360" y1="225" x2="420" y2="225"/>

      <rect x="560" y="195" width="70" height="60" rx="4"/>
      <line x1="595" y1="195" x2="595" y2="255"/>
      <line x1="560" y1="225" x2="630" y2="225"/>

      <rect x="650" y="195" width="70" height="60" rx="4"/>
      <line x1="685" y1="195" x2="685" y2="255"/>
      <line x1="650" y1="225" x2="720" y2="225"/>
    </g>

    <!-- Main Double Door -->
    <rect x="450" y="270" width="80" height="120" fill="#6D4C41" stroke="#1C241B" stroke-width="3.5" rx="4"/>
    <rect x="458" y="278" width="30" height="104" fill="#8D6E63" stroke="#1C241B" stroke-width="2"/>
    <rect x="492" y="278" width="30" height="104" fill="#8D6E63" stroke="#1C241B" stroke-width="2"/>
    <circle cx="482" cy="330" r="5" fill="#FFD54F" stroke="#1C241B" stroke-width="1.5"/>
    <circle cx="498" cy="330" r="5" fill="#FFD54F" stroke="#1C241B" stroke-width="1.5"/>

    <!-- Mading Board -->
    <rect x="260" y="280" width="150" height="85" fill="#8D6E63" stroke="#1C241B" stroke-width="3.5" rx="4"/>
    <rect x="268" y="288" width="134" height="69" fill="#FFF9C4" stroke="#1C241B" stroke-width="2"/>
    <text x="335" y="306" font-family="'Nunito', sans-serif" font-weight="900" font-size="12" fill="#E65100" text-anchor="middle">📌 MADING ECOBRICK</text>
    <rect x="278" y="315" width="50" height="34" fill="#E8F5E9" rx="3" stroke="#1C241B" stroke-width="1.5"/>
    <line x1="336" y1="318" x2="390" y2="318" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
    <line x1="336" y1="330" x2="380" y2="330" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>

    <!-- Clock -->
    <circle cx="490" cy="215" r="22" fill="#FFFFFF" stroke="#1C241B" stroke-width="3.5"/>
    <line x1="490" y1="215" x2="490" y2="200" stroke="#1C241B" stroke-width="3" stroke-linecap="round"/>
    <line x1="490" y1="215" x2="502" y2="215" stroke="#1C241B" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- INDONESIAN FLAG POLE -->
  <g id="comic-flagpole" filter="url(#comicShadow)">
    <line x1="170" y1="120" x2="170" y2="420" stroke="#B0BEC5" stroke-width="8"/>
    <circle cx="170" cy="116" r="8" fill="#FFD54F" stroke="#1C241B" stroke-width="2"/>
    <rect x="174" y="125" width="60" height="20" fill="#E53935" stroke="#1C241B" stroke-width="2"/>
    <rect x="174" y="145" width="60" height="20" fill="#FFFFFF" stroke="#1C241B" stroke-width="2"/>
  </g>

  <!-- ==================== MAIN GROUND & LAWN ==================== -->
  <path d="M -20 420 Q 400 370 780 410 T 1300 390 L 1300 740 L -20 740 Z" fill="url(#comicLawn)" stroke="#1C241B" stroke-width="3.5"/>

  <!-- PAVED WALKWAY -->
  <path d="M 450 390 Q 470 470 490 550 T 560 740 L 370 740 Q 380 580 390 490 T 430 390 Z" fill="#D7CCC8" stroke="#1C241B" stroke-width="3.5"/>
  <path d="M 420 420 L 465 420 M 405 460 L 475 460 M 395 510 L 485 510 M 385 570 L 505 570 M 375 640 L 528 640 M 370 710 L 545 710" stroke="#8D6E63" stroke-width="3" stroke-dasharray="10,8"/>

  <!-- RIVER (LEFT SIDE FLOWING DOWN) -->
  <g id="comic-river">
    <path d="M -20 520 Q 120 490 180 560 T 270 740 L -20 740 Z" fill="url(#comicRiver)" stroke="#1C241B" stroke-width="3.5"/>
    <path d="M 10 540 Q 80 525 120 555 T 210 680" fill="none" stroke="#E0F7FA" stroke-width="4" stroke-linecap="round"/>
    <!-- River Stones -->
    <ellipse cx="140" cy="515" rx="16" ry="9" fill="#78909C" stroke="#1C241B" stroke-width="2"/>
    <ellipse cx="195" cy="555" rx="18" ry="10" fill="#607D8B" stroke="#1C241B" stroke-width="2"/>
    <ellipse cx="250" cy="640" rx="20" ry="11" fill="#455A64" stroke="#1C241B" stroke-width="2"/>

    <!-- CUTE FISH SWIMMING IN RIVER (RESTORED) -->
    <g id="comic-fish">
      <path d="M 70 610 C 82 598 100 605 105 610 C 100 615 82 622 70 610 Z M 105 610 L 114 604 L 114 616 Z" fill="#FF7043" stroke="#1C241B" stroke-width="1.5"/>
      <circle cx="78" cy="607" r="2" fill="#FFFFFF"/>
      <path d="M 120 670 C 132 658 150 665 155 670 C 150 675 132 682 120 670 Z M 155 670 L 164 664 L 164 676 Z" fill="#FFA726" stroke="#1C241B" stroke-width="1.5"/>
    </g>
  </g>

  <!-- TREES AND BUSHES WITH GARDEN FLOWERS (RESTORED) -->
  <g id="comic-trees" filter="url(#comicShadow)">
    <!-- Tree Left -->
    <rect x="40" y="240" width="36" height="230" fill="#6D4C41" rx="6" stroke="#1C241B" stroke-width="3.5"/>
    <g fill="#4CAF50" stroke="#1C241B" stroke-width="3.5" stroke-linejoin="round">
      <circle cx="58" cy="220" r="75"/>
      <circle cx="20" cy="200" r="60"/>
      <circle cx="95" cy="200" r="60"/>
      <circle cx="58" cy="155" r="65" fill="#81C784"/>
    </g>

    <!-- Tree Right -->
    <rect x="1175" y="210" width="40" height="250" fill="#6D4C41" rx="7" stroke="#1C241B" stroke-width="3.5"/>
    <g fill="#388E3C" stroke="#1C241B" stroke-width="3.5" stroke-linejoin="round">
      <circle cx="1195" cy="190" r="85"/>
      <circle cx="1150" cy="170" r="68"/>
      <circle cx="1240" cy="170" r="68"/>
      <circle cx="1195" cy="120" r="70" fill="#66BB6A"/>
    </g>

    <!-- Bushes -->
    <path d="M 720 395 Q 745 360 780 375 Q 815 350 850 375 Q 875 395 860 420 L 710 420 Z" fill="#66BB6A" stroke="#1C241B" stroke-width="3.5"/>
    <path d="M 940 405 Q 965 370 1000 385 Q 1035 360 1070 385 Q 1095 405 1080 430 L 930 430 Z" fill="#4CAF50" stroke="#1C241B" stroke-width="3.5"/>

    <!-- COLORFUL FLOWERS (RESTORED) -->
    <g transform="translate(320, 480)" stroke="#1C241B" stroke-width="1.5">
      <circle cx="0" cy="0" r="7" fill="#E91E63"/><circle cx="0" cy="0" r="3" fill="#FFEB3B"/>
      <circle cx="25" cy="15" r="6" fill="#9C27B0"/><circle cx="25" cy="15" r="2.5" fill="#FFEB3B"/>
      <circle cx="290" cy="10" r="7" fill="#FF9800"/><circle cx="290" cy="10" r="3" fill="#FFFFFF"/>
      <circle cx="320" cy="-8" r="6" fill="#E91E63"/><circle cx="320" cy="-8" r="2.5" fill="#FFEB3B"/>
      <circle cx="530" cy="-10" r="7" fill="#2196F3"/><circle cx="530" cy="-10" r="3" fill="#FFEB3B"/>
    </g>
  </g>

  <!-- PARK BENCH -->
  <g id="comic-park-bench" filter="url(#comicShadow)">
    <rect x="255" y="450" width="12" height="50" fill="#37474F" stroke="#1C241B" stroke-width="2"/>
    <rect x="335" y="450" width="12" height="50" fill="#37474F" stroke="#1C241B" stroke-width="2"/>
    <rect x="240" y="425" width="115" height="12" fill="#A1887F" rx="3" stroke="#1C241B" stroke-width="2.5"/>
    <rect x="240" y="440" width="115" height="12" fill="#8D6E63" rx="3" stroke="#1C241B" stroke-width="2.5"/>
    <rect x="240" y="458" width="115" height="14" fill="#5D4037" rx="3" stroke="#1C241B" stroke-width="2.5"/>
  </g>

  <!-- SORTED TRASH BINS -->
  <g id="comic-trash-bins" filter="url(#comicShadow)">
    <!-- Organic Bin -->
    <rect x="735" y="435" width="50" height="70" fill="#4CAF50" rx="6" stroke="#1C241B" stroke-width="3.5"/>
    <rect x="728" y="425" width="64" height="14" fill="#2E7D32" rx="4" stroke="#1C241B" stroke-width="3"/>
    <text x="760" y="470" font-family="'Nunito', sans-serif" font-weight="900" font-size="10" fill="#FFFFFF" text-anchor="middle">ORGANIK</text>

    <!-- Anorganic Bin -->
    <rect x="805" y="435" width="50" height="70" fill="#1E88E5" rx="6" stroke="#1C241B" stroke-width="3.5"/>
    <rect x="798" y="425" width="64" height="14" fill="#1565C0" rx="4" stroke="#1C241B" stroke-width="3"/>
    <text x="830" y="470" font-family="'Nunito', sans-serif" font-weight="900" font-size="9" fill="#FFFFFF" text-anchor="middle">ANORGANIK</text>
  </g>

  <!-- ECOBRICK DISPLAY RACK WITH GOOD SAMPLE BOTTLES (RESTORED) -->
  <g id="comic-ecobrick-rack" filter="url(#comicShadow)">
    <rect x="950" y="405" width="230" height="135" fill="none" stroke="#1C241B" stroke-width="8" rx="6"/>
    <line x1="950" y1="472" x2="1180" y2="472" stroke="#1C241B" stroke-width="6"/>
    <polygon points="930,405 1200,405 1180,388 950,388" fill="#8D6E63" stroke="#1C241B" stroke-width="3"/>
    <rect x="945" y="385" width="240" height="22" fill="#5D4037" rx="3" stroke="#1C241B" stroke-width="3"/>
    <text x="1065" y="400" font-family="'Fredoka', sans-serif" font-weight="700" font-size="12" fill="#FFD54F" text-anchor="middle">🏆 KARYA ECOBRICK SD SILIRAGUNG</text>

    <!-- Ecobrick Rack Shelf (Decorative Bottles Rendered dynamically via JS using assets/ICON/ecobrick.png.png) -->
  </g>

  <!-- SD STUDENT CHARACTERS (RESTORED) -->
  <!-- Student 1: Girl near walkway -->
  <g id="comic-student-girl" transform="translate(560, 435)" filter="url(#comicShadow)">
    <path d="M 15 38 L 2 70 L 34 70 L 22 38 Z" fill="#E53935" stroke="#1C241B" stroke-width="2"/>
    <rect x="10" y="20" width="16" height="20" fill="#FFFFFF" stroke="#1C241B" stroke-width="2" rx="2"/>
    <polygon points="12,20 18,27 24,20" fill="#E53935"/>
    <circle cx="18" cy="11" r="11" fill="#FFCC80" stroke="#1C241B" stroke-width="2"/>
    <path d="M 7 11 C 7 -3 29 -3 29 11 Z" fill="#37474F" stroke="#1C241B" stroke-width="2"/>
    <circle cx="5" cy="13" r="5" fill="#37474F"/>
    <circle cx="31" cy="13" r="5" fill="#37474F"/>
    <circle cx="14" cy="10" r="1.8" fill="#212121"/>
    <circle cx="22" cy="10" r="1.8" fill="#212121"/>
    <path d="M 15 15 Q 18 19 21 15" fill="none" stroke="#E91E63" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="11" y="70" width="5" height="16" fill="#FFCC80" stroke="#1C241B" stroke-width="1.5"/>
    <rect x="21" y="70" width="5" height="16" fill="#FFCC80" stroke="#1C241B" stroke-width="1.5"/>
    <ellipse cx="12" cy="87" rx="5" ry="3" fill="#212121"/>
    <ellipse cx="22" cy="87" rx="5" ry="3" fill="#212121"/>
  </g>

  <!-- Student 2: Boy tossing candy wrapper -->
  <g id="comic-student-boy" transform="translate(865, 420)" filter="url(#comicShadow)">
    <rect x="8" y="58" width="6" height="28" fill="#1565C0" stroke="#1C241B" stroke-width="1.5"/>
    <rect x="19" y="58" width="6" height="28" fill="#1565C0" stroke="#1C241B" stroke-width="1.5"/>
    <ellipse cx="10" cy="87" rx="5" ry="3" fill="#3E2723"/>
    <ellipse cx="21" cy="87" rx="5" ry="3" fill="#3E2723"/>
    <rect x="5" y="26" width="24" height="34" fill="#FFB300" stroke="#1C241B" stroke-width="2" rx="4"/>
    <circle cx="17" cy="14" r="12" fill="#FFCC80" stroke="#1C241B" stroke-width="2"/>
    <path d="M 5 13 C 5 0 29 0 29 13 Q 24 5 17 5 Q 10 5 5 13 Z" fill="#424242"/>
    <circle cx="13" cy="14" r="1.8" fill="#212121"/>
    <circle cx="20" cy="14" r="1.8" fill="#212121"/>
    <path d="M 14 18 Q 17 21 20 18" fill="none" stroke="#424242" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 26 32 L 42 27 L 50 37" fill="none" stroke="#FFCC80" stroke-width="4.5" stroke-linecap="round"/>
  </g>

</svg>
