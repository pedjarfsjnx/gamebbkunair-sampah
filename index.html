<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💻 🏆 Detektif Lingkungan - Multi-Laptop Online Room System KKN SD Negeri 4 Siliragung</title>
  <meta name="description" content="Mini game edukatif interaktif mode multi-laptop realtime online room system untuk siswa SD mengenai pemilahan sampah dan cara membuat Ecobrick.">
  
  <!-- CSS Style Sheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- Main 16:9 Aspect Ratio Game Viewport -->
  <main id="game-viewport" class="game-viewport">
    
    <!-- Top Game Header (Multiplayer Realtime Scoreboard & Room Code Banner) -->
    <header class="game-header">
      <!-- Left Title & Room Code Banner -->
      <div class="header-title">
        <span>🏆</span>
        <span>Detektif Lingkungan</span>
        <div id="room-code-banner" class="room-code-banner" style="display: none;">
          <span class="room-label">KODE RUANGAN:</span>
          <span id="room-code-text" class="room-code-val">SILIR-88</span>
        </div>
      </div>

      <!-- Center MULTIPLAYER Realtime Team Scorecards -->
      <div id="team-scorecards-container" class="header-team-scorecards">
        <!-- Rendered dynamically by UI Manager -->
      </div>

      <!-- Right Timer & Mute Button -->
      <div class="header-controls">
        <div id="timer-box" class="timer-box">
          <span>⏰</span>
          <span id="timer-text">03:00</span>
        </div>
        <button id="btn-sound" class="btn-icon-control" title="Mute/Unmute Audio">🔊</button>
      </div>
    </header>

    <!-- Progress Bar (Under Header) -->
    <div class="progress-bar-track">
      <div id="progress-bar-fill" class="progress-bar-fill"></div>
    </div>

    <!-- Main Game Scene Area -->
    <section id="game-scene" class="game-scene">
      <!-- Vector Background Image HD -->
      <img src="assets/images/schoolyard_hd.svg" alt="Halaman Sekolah SD Siliragung HD" class="scene-svg">

      <!-- Interactive Hotspots Layer -->
      <div id="hotspot-layer" class="hotspot-layer">
        <!-- Rendered dynamically by JS -->
      </div>
    </section>

    <!-- Bottom Control Bar (Team Selector & Detective Lens Feature) -->
    <footer class="bottom-controls-bar">
      <!-- Team Selector Pills for 1-Screen Mode -->
      <div id="team-selector-pills" class="team-selector-pills">
        <!-- Rendered dynamically by JS -->
      </div>

      <button id="btn-lens" class="btn-lens">
        <span>🔍</span>
        <span>Gunakan Lensa Detektif</span>
      </button>
    </footer>

    <!-- Confetti Canvas Layer -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Modal Dialog Overlay (Role Selection, Room Code Entry, Item Preview, Victory Podium) -->
    <div id="modal-overlay" class="modal-overlay">
      <div class="modal-card">
        <div id="modal-icon" class="modal-icon">🏆</div>
        <h2 id="modal-title" class="modal-title">Judul Modal</h2>
        <div id="modal-body" class="modal-body">
          Isi modal penjelasan...
        </div>
        <button id="modal-action-btn" class="btn-action-primary">Lanjut</button>
      </div>
    </div>

  </main>

  <!-- External PeerJS Library for Multi-Laptop WebRTC P2P Sync (Auto fallback if offline) -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <!-- JavaScript Modules (Order Dependent) -->
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/state.js"></script>
  <script src="js/network.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
